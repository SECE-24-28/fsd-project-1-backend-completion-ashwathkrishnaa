<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customers – ASKR Admin</title>
<link rel="stylesheet" href="admin.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body data-title="Customers" data-breadcrumb="Customers">
<div class="admin-wrapper">
  <div id="sidebar-placeholder"></div>
  <div class="main-content" id="mainContent">
    <div id="header-placeholder"></div>
    <div class="page-content">

      <div class="stats-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:24px">
        <div class="stat-card gold"><div><div class="stat-label">Total Customers</div><div class="stat-value">8,920</div><div class="stat-change up"><i class="fas fa-arrow-up"></i> +24.6%</div></div><div class="stat-icon gold"><i class="fas fa-users"></i></div></div>
        <div class="stat-card green"><div><div class="stat-label">Active</div><div class="stat-value">8,742</div></div><div class="stat-icon green"><i class="fas fa-user-check"></i></div></div>
        <div class="stat-card orange"><div><div class="stat-label">New This Month</div><div class="stat-value">342</div></div><div class="stat-icon orange"><i class="fas fa-user-plus"></i></div></div>
        <div class="stat-card blue"><div><div class="stat-label">Avg Order Value</div><div class="stat-value">₹1,840</div></div><div class="stat-icon blue"><i class="fas fa-chart-bar"></i></div></div>
      </div>

      <div class="admin-card">
        <div class="admin-card-header">
          <h3>Customer Management</h3>
          <div style="display:flex;gap:10px;flex-wrap:wrap">
            <div style="display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:7px 12px">
              <i class="fas fa-search" style="color:var(--text-muted);font-size:0.8rem"></i>
              <input type="text" id="custSearch" placeholder="Search customers..." style="background:none;border:none;color:var(--text);font-size:0.83rem;outline:none;width:180px" oninput="renderCustomers()">
            </div>
            <select class="form-control" id="custStatusFilter" style="width:auto;padding:7px 12px;font-size:0.82rem" onchange="renderCustomers()">
              <option value="">All Status</option>
              <option value="active">Active</option>
              <option value="blocked">Blocked</option>
            </select>
            <button class="btn btn-outline btn-sm"><i class="fas fa-download"></i> Export</button>
          </div>
        </div>
        <div style="overflow-x:auto">
          <table class="admin-table" id="customersTable"></table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- VIEW CUSTOMER MODAL -->
<div class="modal-overlay" id="custModal">
  <div class="modal">
    <div class="modal-header">
      <h3>Customer Profile</h3>
      <button class="modal-close" onclick="closeModal('custModal')"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body" id="custModalBody"></div>
    <div class="modal-footer">
      <button class="btn btn-danger" onclick="closeModal('custModal');showToast('🚫','Customer blocked','error')"><i class="fas fa-ban"></i> Block User</button>
      <button class="btn btn-outline" onclick="closeModal('custModal')">Close</button>
    </div>
  </div>
</div>

<script src="admin.js"></script>
<script src="admin-components.js"></script>
<script>
const customers = [...SAMPLE_CUSTOMERS, ...SAMPLE_CUSTOMERS.map((c,i) => ({ ...c, id:'cx'+i, name:'Customer '+i, email:'cust'+i+'@email.com', orders: Math.floor(Math.random()*15)+1 }))];

function renderCustomers() {
  const q = document.getElementById('custSearch').value.toLowerCase();
  const sf = document.getElementById('custStatusFilter').value;
  const filtered = customers.filter(c =>
    (!q || c.name.toLowerCase().includes(q) || c.email.toLowerCase().includes(q) || c.mobile.includes(q)) &&
    (!sf || c.status === sf)
  );
  document.getElementById('customersTable').innerHTML = `
    <thead><tr>
      <th>Customer</th><th>Mobile</th><th>Orders</th><th>Total Spent</th>
      <th>Joined</th><th>Status</th><th>Actions</th>
    </tr></thead>
    <tbody>${filtered.map(c => `
      <tr>
        <td><div style="display:flex;gap:12px;align-items:center">
          <div class="avatar-sm" style="background:${c.status==='blocked'?'var(--red)':'var(--accent)'}">${c.name[0]}</div>
          <div><div style="font-weight:600;font-size:0.84rem">${c.name}</div><div style="font-size:0.72rem;color:var(--text-muted)">${c.email}</div></div>
        </div></td>
        <td style="font-size:0.82rem;color:var(--text-muted)">${c.mobile}</td>
        <td><span class="badge badge-muted">${c.orders} orders</span></td>
        <td style="font-weight:700;color:var(--accent)">${c.spent}</td>
        <td style="font-size:0.8rem;color:var(--text-muted)">${c.joined}</td>
        <td>${statusBadge(c.status)}</td>
        <td><div style="display:flex;gap:6px">
          <button class="btn btn-outline btn-xs" onclick="viewCustomer('${c.id}')"><i class="fas fa-eye"></i></button>
          <button class="btn btn-${c.status==='blocked'?'success':'danger'} btn-xs" onclick="toggleBlock('${c.id}')">
            <i class="fas fa-${c.status==='blocked'?'unlock':'ban'}"></i>
          </button>
        </div></td>
      </tr>`).join('')}
    </tbody>`;
}

function viewCustomer(id) {
  const c = customers.find(x => x.id === id);
  if (!c) return;
  document.getElementById('custModalBody').innerHTML = `
    <div style="text-align:center;margin-bottom:20px">
      <div style="width:70px;height:70px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--gold));display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:800;color:#fff;margin:0 auto 12px">${c.name[0]}</div>
      <div style="font-weight:700;font-size:1.1rem">${c.name}</div>
      <div style="font-size:0.83rem;color:var(--text-muted)">${c.email}</div>
      <div style="margin-top:8px">${statusBadge(c.status)}</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div style="background:rgba(255,255,255,0.03);border-radius:10px;padding:14px;text-align:center">
        <div style="font-size:1.5rem;font-weight:900;color:var(--accent);font-family:Montserrat">${c.orders}</div>
        <div style="font-size:0.75rem;color:var(--text-muted)">Total Orders</div>
      </div>
      <div style="background:rgba(255,255,255,0.03);border-radius:10px;padding:14px;text-align:center">
        <div style="font-size:1.5rem;font-weight:900;color:var(--accent);font-family:Montserrat">${c.spent}</div>
        <div style="font-size:0.75rem;color:var(--text-muted)">Total Spent</div>
      </div>
    </div>
    <div style="margin-top:14px;padding:14px;background:rgba(255,255,255,0.03);border-radius:10px">
      <div style="font-size:0.75rem;color:var(--text-muted);margin-bottom:8px">CONTACT</div>
      <div style="font-size:0.85rem"><i class="fas fa-phone" style="color:var(--accent);margin-right:8px"></i>${c.mobile}</div>
      <div style="font-size:0.85rem;margin-top:6px"><i class="fas fa-calendar" style="color:var(--accent);margin-right:8px"></i>Joined ${c.joined}</div>
    </div>`;
  openModal('custModal');
}

function toggleBlock(id) {
  const c = customers.find(x => x.id === id);
  if (c) { c.status = c.status === 'blocked' ? 'active' : 'blocked'; renderCustomers(); showToast(c.status==='blocked'?'🚫':'✅', `Customer ${c.status}`); }
}

document.addEventListener('DOMContentLoaded', renderCustomers);
</script>
</body>
</html>
