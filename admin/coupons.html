<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coupons – ASKR Admin</title>
<link rel="stylesheet" href="admin.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body data-title="Coupons" data-breadcrumb="Coupons">
<div class="admin-wrapper">
  <div id="sidebar-placeholder"></div>
  <div class="main-content" id="mainContent">
    <div id="header-placeholder"></div>
    <div class="page-content">

      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px">
        <div><h2 style="font-size:1.1rem;font-weight:700">Coupon Management</h2><p style="font-size:0.8rem;color:var(--text-muted);margin-top:2px">Create and manage discount codes</p></div>
        <button class="btn btn-primary" onclick="openModal('couponModal')"><i class="fas fa-plus"></i> Create Coupon</button>
      </div>

      <div class="stats-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:24px">
        <div class="stat-card orange"><div><div class="stat-label">Active Coupons</div><div class="stat-value">8</div></div><div class="stat-icon orange"><i class="fas fa-ticket-alt"></i></div></div>
        <div class="stat-card green"><div><div class="stat-label">Used Today</div><div class="stat-value">47</div></div><div class="stat-icon green"><i class="fas fa-check"></i></div></div>
        <div class="stat-card blue"><div><div class="stat-label">Total Discount Given</div><div class="stat-value">₹28,450</div></div><div class="stat-icon blue"><i class="fas fa-tags"></i></div></div>
        <div class="stat-card gold"><div><div class="stat-label">Expired</div><div class="stat-value">12</div></div><div class="stat-icon gold"><i class="fas fa-clock"></i></div></div>
      </div>

      <div class="admin-card" id="couponsCard">
        <div class="admin-card-header"><h3>All Coupons</h3></div>
        <div style="overflow-x:auto">
          <table class="admin-table" id="couponsTable"></table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- COUPON MODAL -->
<div class="modal-overlay" id="couponModal">
  <div class="modal">
    <div class="modal-header">
      <h3>Create New Coupon</h3>
      <button class="modal-close" onclick="closeModal('couponModal')"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <div class="form-grid-2">
        <div class="form-group"><label class="form-label">Coupon Code *</label><input type="text" class="form-control" id="cCode" placeholder="e.g. SUMMER25" style="text-transform:uppercase" oninput="this.value=this.value.toUpperCase()"></div>
        <div class="form-group"><label class="form-label">Discount Type</label>
          <select class="form-control" id="cType">
            <option value="percent">Percentage (%)</option>
            <option value="flat">Flat Amount (₹)</option>
          </select>
        </div>
      </div>
      <div class="form-grid-2">
        <div class="form-group"><label class="form-label">Discount Value *</label><input type="number" class="form-control" id="cValue" placeholder="e.g. 20"></div>
        <div class="form-group"><label class="form-label">Minimum Order (₹)</label><input type="number" class="form-control" id="cMinOrder" placeholder="e.g. 999"></div>
      </div>
      <div class="form-grid-2">
        <div class="form-group"><label class="form-label">Usage Limit</label><input type="number" class="form-control" id="cLimit" placeholder="e.g. 100 (0 = unlimited)"></div>
        <div class="form-group"><label class="form-label">Expiry Date</label><input type="date" class="form-control" id="cExpiry"></div>
      </div>
      <div class="form-group"><label class="form-label">Applicable To</label>
        <select class="form-control" id="cApply">
          <option>All Products</option><option>Men's Collection</option><option>Women's Collection</option><option>Kids' Collection</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="saveCoupon()"><i class="fas fa-save"></i> Create Coupon</button>
      <button class="btn btn-outline" onclick="closeModal('couponModal')">Cancel</button>
    </div>
  </div>
</div>

<script src="admin.js"></script>
<script src="admin-components.js"></script>
<script>
const coupons = [
  { code:'ASKR10', type:'percent', value:10, minOrder:499,  used:234, limit:500,  expiry:'Apr 30, 2025', status:'active',   apply:'All Products' },
  { code:'ASKR20', type:'percent', value:20, minOrder:999,  used:89,  limit:200,  expiry:'Apr 15, 2025', status:'active',   apply:'All Products' },
  { code:'WELCOME15',type:'percent',value:15,minOrder:0,    used:1420,limit:0,    expiry:'Dec 31, 2025', status:'active',   apply:'All Products' },
  { code:'FASHION25',type:'percent',value:25,minOrder:1499, used:42,  limit:100,  expiry:'Mar 31, 2025', status:'expired',  apply:'All Products' },
  { code:'FLAT200', type:'flat',   value:200,minOrder:1999, used:56,  limit:150,  expiry:'May 30, 2025', status:'active',   apply:'Men\'s Collection' },
  { code:'SUMMER30',type:'percent',value:30,minOrder:2499,  used:0,   limit:50,   expiry:'Jun 30, 2025', status:'active',   apply:'Women\'s Collection' },
];

function renderCoupons() {
  document.getElementById('couponsTable').innerHTML = `
    <thead><tr>
      <th>Code</th><th>Type</th><th>Value</th><th>Min Order</th>
      <th>Used / Limit</th><th>Applicable To</th><th>Expiry</th><th>Status</th><th>Actions</th>
    </tr></thead>
    <tbody>${coupons.map(c => `
      <tr>
        <td><code style="background:rgba(255,107,0,0.1);color:var(--accent);padding:4px 10px;border-radius:6px;font-weight:700;font-size:0.82rem;letter-spacing:1px">${c.code}</code></td>
        <td><span class="badge badge-muted">${c.type==='percent'?'%':'₹'} Discount</span></td>
        <td style="font-weight:700;color:var(--accent)">${c.type==='percent'?c.value+'%':'₹'+c.value}</td>
        <td style="font-size:0.82rem">${c.minOrder?'₹'+c.minOrder:'No min'}</td>
        <td>
          <div style="font-size:0.82rem">${c.used} / ${c.limit||'∞'}</div>
          ${c.limit?`<div class="progress" style="margin-top:5px;width:80px"><div class="progress-bar" style="width:${Math.min(100,(c.used/c.limit)*100)}%;background:var(--accent)"></div></div>`:''}
        </td>
        <td style="font-size:0.8rem;color:var(--text-muted)">${c.apply}</td>
        <td style="font-size:0.8rem;color:var(--text-muted)">${c.expiry}</td>
        <td>${statusBadge(c.status)}</td>
        <td><div style="display:flex;gap:6px">
          <button class="btn btn-outline btn-xs" title="Copy" onclick="navigator.clipboard.writeText('${c.code}');showToast('📋','Code copied!','success')"><i class="fas fa-copy"></i></button>
          <button class="btn btn-danger btn-xs" onclick="confirmDelete('Delete coupon ${c.code}?',()=>showToast('🗑️','Deleted','error'))"><i class="fas fa-trash"></i></button>
        </div></td>
      </tr>`).join('')}
    </tbody>`;
}

function saveCoupon() {
  const code = document.getElementById('cCode').value.trim();
  if (!code) { alert('Coupon code required'); return; }
  coupons.unshift({ code, type:document.getElementById('cType').value, value:+document.getElementById('cValue').value||10, minOrder:+document.getElementById('cMinOrder').value||0, used:0, limit:+document.getElementById('cLimit').value||0, expiry:document.getElementById('cExpiry').value||'Dec 31, 2025', status:'active', apply:document.getElementById('cApply').value });
  closeModal('couponModal');
  renderCoupons();
  showToast('✅','Coupon created successfully','success');
}

document.addEventListener('DOMContentLoaded', renderCoupons);
</script>
</body>
</html>
