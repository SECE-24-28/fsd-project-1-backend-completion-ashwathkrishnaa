<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orders – ASKR Admin</title>
<link rel="stylesheet" href="admin.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body data-title="Orders" data-breadcrumb="Orders">
<div class="admin-wrapper">
  <div id="sidebar-placeholder"></div>
  <div class="main-content" id="mainContent">
    <div id="header-placeholder"></div>
    <div class="page-content">

      <!-- STATS -->
      <div class="stats-grid" style="grid-template-columns:repeat(5,1fr);margin-bottom:24px">
        <div class="stat-card orange"><div><div class="stat-label">All Orders</div><div class="stat-value">1,284</div></div><div class="stat-icon orange"><i class="fas fa-list"></i></div></div>
        <div class="stat-card orange"><div><div class="stat-label">Processing</div><div class="stat-value">48</div></div><div class="stat-icon orange"><i class="fas fa-clock"></i></div></div>
        <div class="stat-card blue"><div><div class="stat-label">Shipped</div><div class="stat-value">126</div></div><div class="stat-icon blue"><i class="fas fa-truck"></i></div></div>
        <div class="stat-card green"><div><div class="stat-label">Delivered</div><div class="stat-value">1,058</div></div><div class="stat-icon green"><i class="fas fa-check-circle"></i></div></div>
        <div class="stat-card gold"><div><div class="stat-label">Cancelled</div><div class="stat-value">52</div></div><div class="stat-icon gold"><i class="fas fa-times-circle"></i></div></div>
      </div>

      <div class="admin-card">
        <div class="admin-card-header">
          <h3>Order Management</h3>
          <div style="display:flex;gap:10px;flex-wrap:wrap">
            <div style="display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:7px 12px">
              <i class="fas fa-search" style="color:var(--text-muted);font-size:0.8rem"></i>
              <input type="text" id="orderSearch" placeholder="Search orders..." style="background:none;border:none;color:var(--text);font-size:0.83rem;outline:none;width:180px" oninput="renderOrders()">
            </div>
            <select class="form-control" id="statusFilter" style="width:auto;padding:7px 12px;font-size:0.82rem" onchange="renderOrders()">
              <option value="">All Status</option>
              <option value="ordered">Ordered</option>
              <option value="packed">Packed</option>
              <option value="processing">Processing</option>
              <option value="shipped">Shipped</option>
              <option value="out_for_delivery">Out for Delivery</option>
              <option value="delivered">Delivered</option>
              <option value="cancelled">Cancelled</option>
            </select>
            <button class="btn btn-outline btn-sm"><i class="fas fa-download"></i> Export</button>
          </div>
        </div>

        <div class="tab-bar" style="margin:16px 22px 0" id="orderTabs">
          <button class="tab-btn active" onclick="setOrderTab('all',this)">All Orders</button>
          <button class="tab-btn" onclick="setOrderTab('processing',this)">Pending</button>
          <button class="tab-btn" onclick="setOrderTab('shipped',this)">Shipped</button>
          <button class="tab-btn" onclick="setOrderTab('delivered',this)">Delivered</button>
          <button class="tab-btn" onclick="setOrderTab('cancelled',this)">Cancelled</button>
        </div>

        <div style="overflow-x:auto;padding:0 0 4px">
          <table class="admin-table" id="ordersTable"></table>
        </div>
        <div style="padding:16px 22px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid rgba(255,255,255,0.05)">
          <span style="font-size:0.8rem;color:var(--text-muted)" id="ordersCountText"></span>
          <div style="display:flex;gap:6px" id="pagination"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ORDER DETAIL MODAL -->
<div class="modal-overlay" id="orderModal">
  <div class="modal" style="max-width:640px">
    <div class="modal-header">
      <h3>Order Details — <span id="modalOrderId" style="color:var(--accent)"></span></h3>
      <button class="modal-close" onclick="closeModal('orderModal')"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body" id="modalOrderBody"></div>
    <div class="modal-footer">
      <select class="form-control" id="updateStatusSel" style="width:auto">
        <option value="ordered">Ordered</option>
        <option value="packed">Packed</option>
        <option value="processing">Processing</option>
        <option value="shipped">Shipped</option>
        <option value="out_for_delivery">Out for Delivery</option>
        <option value="delivered">Delivered</option>
        <option value="cancelled">Cancelled</option>
      </select>
      <button class="btn btn-primary" onclick="updateOrderStatus()"><i class="fas fa-save"></i> Update Status</button>
      <button class="btn btn-outline" onclick="closeModal('orderModal')">Close</button>
    </div>
  </div>
</div>

<script src="admin.js"></script>
<script src="admin-components.js"></script>
<script>
let orderTabFilter = 'all';
let currentOrder = null;
const PAGE_SIZE = 7;
let currentPage = 1;

// Extend sample orders
const ALL_ORDERS = [...SAMPLE_ORDERS, ...SAMPLE_ORDERS.map((o,i) => ({ ...o, id:'ASKR8890123'+i, date:'Mar 20, 2025' }))];

function setOrderTab(tab, btn) {
  orderTabFilter = tab;
  currentPage = 1;
  document.querySelectorAll('#orderTabs .tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderOrders();
}

function getFilteredOrders() {
  const q = document.getElementById('orderSearch').value.toLowerCase();
  const sf = document.getElementById('statusFilter').value;
  return ALL_ORDERS.filter(o => {
    const matchTab = orderTabFilter === 'all' || o.status === orderTabFilter ||
      (orderTabFilter === 'processing' && ['ordered','packed','processing'].includes(o.status));
    const matchStatus = !sf || o.status === sf;
    const matchQ = !q || o.id.toLowerCase().includes(q) || o.customer.toLowerCase().includes(q) || o.email.toLowerCase().includes(q);
    return matchTab && matchStatus && matchQ;
  });
}

function renderOrders() {
  const filtered = getFilteredOrders();
  const start = (currentPage-1)*PAGE_SIZE, end = start+PAGE_SIZE;
  const shown = filtered.slice(start, end);
  document.getElementById('ordersCountText').textContent = `Showing ${shown.length} of ${filtered.length} orders`;

  document.getElementById('ordersTable').innerHTML = `
    <thead><tr>
      <th><input type="checkbox" style="accent-color:var(--accent)"></th>
      <th>Order ID</th><th>Customer</th><th>Items</th><th>Amount</th>
      <th>Payment</th><th>Status</th><th>Date</th><th>Actions</th>
    </tr></thead>
    <tbody>${shown.map(o => `
      <tr>
        <td><input type="checkbox" style="accent-color:var(--accent)"></td>
        <td><span style="font-family:Montserrat;font-size:0.78rem;font-weight:800;color:var(--accent)">#${o.id.slice(-8)}</span></td>
        <td><div style="font-weight:600;font-size:0.84rem">${o.customer}</div><div style="font-size:0.72rem;color:var(--text-muted)">${o.email}</div></td>
        <td><span class="badge badge-muted">${o.items} items</span></td>
        <td style="font-weight:700">${o.amount}</td>
        <td style="font-size:0.8rem;color:var(--text-muted)">${o.payment}</td>
        <td>${statusBadge(o.status)}</td>
        <td style="font-size:0.8rem;color:var(--text-muted)">${o.date}</td>
        <td>
          <div style="display:flex;gap:6px">
            <button class="btn btn-outline btn-xs" onclick="viewOrder('${o.id}')"><i class="fas fa-eye"></i></button>
            <button class="btn btn-success btn-xs" onclick="quickStatus('${o.id}')"><i class="fas fa-check"></i></button>
            <button class="btn btn-danger btn-xs" onclick="confirmDelete('Cancel order #${o.id}?', ()=>showToast('🗑️','Order cancelled','error'))"><i class="fas fa-times"></i></button>
          </div>
        </td>
      </tr>`).join('')}
    </tbody>`;

  // Pagination
  const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
  let pag = '';
  for (let i=1;i<=totalPages;i++) pag += `<button class="btn ${i===currentPage?'btn-primary':'btn-outline'} btn-xs" onclick="currentPage=${i};renderOrders()">${i}</button>`;
  document.getElementById('pagination').innerHTML = pag;
}

function viewOrder(id) {
  const o = ALL_ORDERS.find(x => x.id === id);
  if (!o) return;
  currentOrder = o;
  document.getElementById('modalOrderId').textContent = '#' + o.id.slice(-8);
  document.getElementById('updateStatusSel').value = o.status;
  document.getElementById('modalOrderBody').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px">
      <div style="background:rgba(255,255,255,0.03);border-radius:10px;padding:14px">
        <div style="font-size:0.7rem;color:var(--text-muted);letter-spacing:1px;margin-bottom:8px">CUSTOMER</div>
        <div style="font-weight:700">${o.customer}</div>
        <div style="font-size:0.8rem;color:var(--text-muted)">${o.email}</div>
      </div>
      <div style="background:rgba(255,255,255,0.03);border-radius:10px;padding:14px">
        <div style="font-size:0.7rem;color:var(--text-muted);letter-spacing:1px;margin-bottom:8px">PAYMENT</div>
        <div style="font-weight:700">${o.payment}</div>
        <div style="font-size:0.8rem">${statusBadge('paid')}</div>
      </div>
    </div>
    <div style="background:rgba(255,255,255,0.03);border-radius:10px;padding:14px;margin-bottom:16px">
      <div style="font-size:0.7rem;color:var(--text-muted);letter-spacing:1px;margin-bottom:12px">ORDER ITEMS</div>
      ${Array.from({length:o.items},(_,i)=>`
        <div style="display:flex;gap:12px;align-items:center;margin-bottom:10px">
          <div style="width:40px;height:48px;border-radius:6px;overflow:hidden"><img src="${SAMPLE_PRODUCTS[i%SAMPLE_PRODUCTS.length].image}" style="width:100%;height:100%;object-fit:cover"></div>
          <div style="flex:1"><div style="font-size:0.84rem;font-weight:600">${SAMPLE_PRODUCTS[i%SAMPLE_PRODUCTS.length].name}</div><div style="font-size:0.75rem;color:var(--text-muted)">Qty: 1 · Size: M</div></div>
          <div style="font-weight:700;color:var(--accent)">₹${SAMPLE_PRODUCTS[i%SAMPLE_PRODUCTS.length].price.toLocaleString()}</div>
        </div>`).join('')}
    </div>
    <div style="display:flex;justify-content:space-between;font-weight:800;font-size:1rem;padding:12px 14px;background:rgba(255,107,0,0.06);border-radius:10px">
      <span>Total Amount</span><span style="color:var(--accent)">${o.amount}</span>
    </div>`;
  openModal('orderModal');
}

function quickStatus(id) {
  const statusFlow = { ordered:'packed', packed:'processing', processing:'shipped', shipped:'out_for_delivery', out_for_delivery:'delivered' };
  const o = ALL_ORDERS.find(x => x.id === id);
  if (o && statusFlow[o.status]) { o.status = statusFlow[o.status]; renderOrders(); showToast('✅',`Order updated to ${o.status}`,'success'); }
}

function updateOrderStatus() {
  if (!currentOrder) return;
  currentOrder.status = document.getElementById('updateStatusSel').value;
  closeModal('orderModal'); renderOrders();
  showToast('✅','Order status updated successfully','success');
}

document.addEventListener('DOMContentLoaded', renderOrders);
</script>
</body>
</html>
