<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track Order – ASKR Clothing</title>
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Montserrat:wght@700;800;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
.tracking-wrap { max-width: 800px; margin: 0 auto; padding: 0 5% 80px; }
.track-search { display: flex; gap: 0; margin-bottom: 40px; }
.track-search input { flex: 1; padding: 15px 20px; background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); border-right: none; border-radius: 10px 0 0 10px; color: var(--text); font-family: 'Inter',sans-serif; outline: none; font-size: 0.9rem; transition: all 0.3s; }
.track-search input:focus { border-color: var(--accent); }
.track-search button { padding: 15px 24px; background: var(--accent); border: none; border-radius: 0 10px 10px 0; color: #fff; font-weight: 600; cursor: pointer; font-family: 'Poppins',sans-serif; transition: all 0.3s; }
.track-search button:hover { background: var(--accent-hover); }
.order-info-card { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; padding: 24px; margin-bottom: 30px; display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }
.order-thumb-big { width: 80px; height: 96px; border-radius: 10px; overflow: hidden; flex-shrink: 0; }
.order-thumb-big img { width: 100%; height: 100%; object-fit: cover; }
.timeline { position: relative; }
.timeline::before { content: ''; position: absolute; left: 24px; top: 0; bottom: 0; width: 2px; background: linear-gradient(to bottom, var(--accent) var(--progress, 80%), rgba(255,255,255,0.1) var(--progress, 80%)); }
.timeline-step { display: flex; gap: 20px; margin-bottom: 0; position: relative; padding-bottom: 36px; }
.timeline-step:last-child { padding-bottom: 0; }
.step-icon-wrap { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 1.1rem; position: relative; z-index: 1; transition: all 0.3s; }
.step-icon-wrap.done { background: var(--accent); border: 3px solid var(--accent); color: #fff; box-shadow: 0 0 20px rgba(255,107,0,0.4); }
.step-icon-wrap.active { background: rgba(255,107,0,0.15); border: 3px solid var(--accent); color: var(--accent); animation: pulse 2s ease-in-out infinite; }
.step-icon-wrap.pending { background: rgba(255,255,255,0.05); border: 3px solid rgba(255,255,255,0.15); color: var(--text-muted); }
@keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(255,107,0,0.4); } 50% { box-shadow: 0 0 0 10px rgba(255,107,0,0); } }
.step-content { flex: 1; padding-top: 8px; }
.step-title { font-weight: 700; font-size: 0.95rem; margin-bottom: 4px; }
.step-title.done { color: var(--text); }
.step-title.active { color: var(--accent); }
.step-title.pending { color: var(--text-muted); }
.step-desc { font-size: 0.8rem; color: var(--text-muted); line-height: 1.6; }
.step-time { font-size: 0.72rem; color: var(--text-muted); margin-top: 4px; }
.step-time.done { color: var(--accent); }
.progress-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,107,0,0.12); border: 1px solid rgba(255,107,0,0.3); border-radius: 20px; padding: 4px 12px; font-size: 0.75rem; font-weight: 600; color: var(--accent); margin-top: 6px; }
.estimated-delivery { background: rgba(46,204,113,0.08); border: 1px solid rgba(46,204,113,0.2); border-radius: 12px; padding: 16px 20px; margin-bottom: 30px; display: flex; align-items: center; gap: 12px; }
.map-placeholder { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; height: 200px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-muted); margin-top: 30px; }
</style>
</head>
<body>
<div id="navbar-placeholder"></div>

<div class="page-header">
  <h1>Track <span style="color:var(--accent)">Order</span></h1>
  <p>Real-time updates on your order status</p>
  <div class="breadcrumb"><a href="home.html">Home</a><span class="sep">›</span><span>Order Tracking</span></div>
</div>

<div class="tracking-wrap">
  <div class="track-search">
    <input type="text" id="trackInput" placeholder="Enter Order ID (e.g. ASKR12345678)" value="ASKR12345678">
    <button onclick="trackOrder()"><i class="fas fa-search"></i> Track</button>
  </div>

  <div id="trackingResult">
    <!-- Will render on load -->
  </div>
</div>

<div id="footer-placeholder"></div>
<script src="app.js"></script>
<script src="components.js"></script>
<script>
const trackingSteps = [
  { icon:'fas fa-check-circle', title:'Order Placed', desc:'Your order has been successfully placed and confirmed.', time:'Mar 22, 2025 · 10:34 AM', status:'done' },
  { icon:'fas fa-box-open', title:'Order Packed', desc:'Your items have been carefully packed and are ready for dispatch.', time:'Mar 22, 2025 · 2:15 PM', status:'done' },
  { icon:'fas fa-truck', title:'Shipped', desc:'Your order has been picked up by BlueDart Courier. Tracking: BD987654321', time:'Mar 23, 2025 · 9:00 AM', status:'done' },
  { icon:'fas fa-shipping-fast', title:'Out for Delivery', desc:'Your package is out for delivery. Expected arrival today between 2PM – 6PM.', time:'Mar 25, 2025 · 8:45 AM', status:'active' },
  { icon:'fas fa-home', title:'Delivered', desc:'Package delivered successfully.', time:'Estimated: Mar 25, 2025', status:'pending' },
];

function trackOrder() {
  const id = document.getElementById('trackInput').value.trim() || 'ASKR12345678';
  const product = PRODUCTS[0];

  document.getElementById('trackingResult').innerHTML = `
    <div class="order-info-card">
      <div class="order-thumb-big"><img src="${product.image}" alt="${product.name}"></div>
      <div style="flex:1">
        <div style="font-size:0.7rem;color:var(--accent);letter-spacing:2px;font-weight:600;margin-bottom:6px">ORDER #${id}</div>
        <div style="font-weight:700;font-size:1rem;margin-bottom:4px">${product.name} <span style="color:var(--text-muted);font-size:0.8rem">× 1</span></div>
        <div style="font-size:0.8rem;color:var(--text-muted)">Size: M · Color: Black</div>
        <div style="font-family:Montserrat;font-weight:800;color:var(--accent);font-size:1.1rem;margin-top:8px">₹${product.price.toLocaleString()}</div>
      </div>
      <div style="text-align:right">
        <span class="progress-badge"><i class="fas fa-shipping-fast"></i> Out for Delivery</span>
        <div style="font-size:0.75rem;color:var(--text-muted);margin-top:8px">Placed: Mar 22, 2025</div>
      </div>
    </div>

    <div class="estimated-delivery">
      <i class="fas fa-calendar-check" style="color:#2ecc71;font-size:1.5rem"></i>
      <div>
        <div style="font-weight:700;font-size:0.9rem">Estimated Delivery Today</div>
        <div style="font-size:0.8rem;color:var(--text-muted)">March 25, 2025 between 2:00 PM – 6:00 PM</div>
      </div>
    </div>

    <div style="background:var(--card-bg);border:1px solid rgba(255,255,255,0.06);border-radius:16px;padding:28px;margin-bottom:24px">
      <h4 style="font-size:0.8rem;letter-spacing:2px;text-transform:uppercase;margin-bottom:28px;color:var(--text-muted)">Shipment Timeline</h4>
      <div class="timeline">
        ${trackingSteps.map(step => `
          <div class="timeline-step">
            <div class="step-icon-wrap ${step.status}">
              <i class="${step.icon}"></i>
              ${step.status==='done'?'':''}
            </div>
            <div class="step-content">
              <div class="step-title ${step.status}">${step.title} ${step.status==='active'?'<span style="font-size:0.72rem;background:rgba(255,107,0,0.12);color:var(--accent);padding:2px 8px;border-radius:10px;font-weight:600">In Progress</span>':''}</div>
              <div class="step-desc">${step.desc}</div>
              <div class="step-time ${step.status==='done'?'done':''}">${step.time}</div>
            </div>
          </div>`).join('')}
      </div>
    </div>

    <div style="background:var(--card-bg);border:1px solid rgba(255,255,255,0.06);border-radius:16px;padding:24px;margin-bottom:20px">
      <h4 style="font-size:0.85rem;font-weight:700;margin-bottom:16px">Delivery Partner</h4>
      <div style="display:flex;gap:16px;align-items:center">
        <div style="width:50px;height:50px;border-radius:10px;background:rgba(255,107,0,0.1);display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--accent);font-size:0.75rem">BD</div>
        <div>
          <div style="font-weight:600">BlueDart Express</div>
          <div style="font-size:0.8rem;color:var(--text-muted)">Tracking: BD987654321</div>
        </div>
        <a href="#" class="btn btn-outline btn-sm" style="margin-left:auto"><i class="fas fa-external-link-alt"></i> Track on BlueDart</a>
      </div>
    </div>

    <div style="text-align:center;display:flex;gap:12px;justify-content:center">
      <a href="profile.html" class="btn btn-outline btn-sm"><i class="fas fa-arrow-left"></i> My Orders</a>
      <button class="btn btn-primary btn-sm" onclick="showToast('📞','Connecting to support...')"><i class="fas fa-headset"></i> Get Support</button>
    </div>`;
}

document.addEventListener('DOMContentLoaded', trackOrder);
</script>
</body>
</html>
