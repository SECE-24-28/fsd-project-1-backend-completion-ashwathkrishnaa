<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Women's Collection – ASKR Clothing</title>
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Montserrat:wght@700;800;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root { --women-accent: #B76E79; --women-light: #e8a0aa; }
.women-theme .cat-tab.active, .women-theme .cat-tab:hover { background: var(--women-accent); border-color: var(--women-accent); }
.women-theme .btn-primary { background: var(--women-accent); }
.women-theme .btn-primary:hover { background: var(--women-light); box-shadow: 0 6px 25px rgba(183,110,121,0.4); }
.women-theme .price-current { color: var(--women-accent); }
.women-theme .product-brand { color: var(--women-accent); }
.collection-banner { height: 300px; position: relative; overflow: hidden; }
.collection-banner img { width: 100%; height: 100%; object-fit: cover; opacity: 0.3; }
.collection-banner-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent, rgba(13,13,13,0.92)); display: flex; align-items: flex-end; padding: 40px 5%; }
.cat-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 30px; }
.cat-tab { padding: 8px 20px; border-radius: 50px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: var(--text-muted); font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.3s; font-family: 'Poppins', sans-serif; }
</style>
</head>
<body class="women-theme">
<div id="navbar-placeholder"></div>

<div style="padding-top:70px">
  <div class="collection-banner">
    <img src="https://images.unsplash.com/photo-1469334031218-e382a71b716b?w=1400&q=80" alt="Women">
    <div class="collection-banner-overlay">
      <div>
        <div style="display:inline-flex;align-items:center;gap:8px;background:rgba(183,110,121,0.15);border:1px solid rgba(183,110,121,0.35);border-radius:50px;padding:6px 16px;font-size:0.75rem;color:var(--women-accent);font-weight:600;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px"><i class="fas fa-female"></i> Women's Collection</div>
        <h1 style="font-size:clamp(1.8rem,4vw,3rem);font-weight:900">Elegance <span style="color:var(--women-accent)">Redefined</span></h1>
        <p style="color:var(--text-muted);margin-top:6px">Sarees · Kurtis · Dresses · Tops · Jeans</p>
      </div>
    </div>
  </div>
</div>

<div class="shop-layout">
  <aside class="filter-sidebar" id="filterSidebar">
    <div class="filter-title">Filters <span class="clear-filters" onclick="clearFilters()" style="color:var(--women-accent)">Clear All</span></div>
    <div class="filter-section">
      <h5>Category</h5>
      <div class="filter-option"><input type="checkbox" id="fc-sarees"><label for="fc-sarees">Sarees (142)</label></div>
      <div class="filter-option"><input type="checkbox" id="fc-kurtis"><label for="fc-kurtis">Kurtis (98)</label></div>
      <div class="filter-option"><input type="checkbox" id="fc-dresses"><label for="fc-dresses">Dresses (186)</label></div>
      <div class="filter-option"><input type="checkbox" id="fc-tops"><label for="fc-tops">Tops (220)</label></div>
      <div class="filter-option"><input type="checkbox" id="fc-jeans-w"><label for="fc-jeans-w">Jeans (76)</label></div>
    </div>
    <div class="filter-section">
      <h5>Price Range</h5>
      <input type="range" min="0" max="10000" value="10000" oninput="document.getElementById('priceVal').textContent='₹'+parseInt(this.value).toLocaleString()" style="accent-color:var(--women-accent)">
      <div class="price-display" style="color:var(--women-accent)"><span>₹0</span><span id="priceVal">₹10,000</span></div>
    </div>
    <div class="filter-section">
      <h5>Size</h5>
      <div class="size-filters">
        <button class="size-btn" onclick="this.classList.toggle('active')" style="--active-color:var(--women-accent)">XS</button>
        <button class="size-btn" onclick="this.classList.toggle('active')">S</button>
        <button class="size-btn active" onclick="this.classList.toggle('active')">M</button>
        <button class="size-btn" onclick="this.classList.toggle('active')">L</button>
        <button class="size-btn" onclick="this.classList.toggle('active')">XL</button>
        <button class="size-btn" onclick="this.classList.toggle('active')">Free</button>
      </div>
    </div>
    <div class="filter-section">
      <h5>Color</h5>
      <div class="color-swatches">
        <div class="color-swatch active" style="background:#f8c8d4;border-color:var(--women-accent)" title="Pink"></div>
        <div class="color-swatch" style="background:#d4a8c8" title="Lavender"></div>
        <div class="color-swatch" style="background:#c8f0c8" title="Mint"></div>
        <div class="color-swatch" style="background:#d40000" title="Red"></div>
        <div class="color-swatch" style="background:#fff" title="White"></div>
        <div class="color-swatch" style="background:#0D0D0D" title="Black"></div>
      </div>
    </div>
    <button class="btn btn-full" style="background:var(--women-accent);color:#fff;margin-top:10px;padding:12px;border-radius:8px;font-family:Poppins;font-weight:600;font-size:0.85rem;letter-spacing:1px;cursor:pointer;border:none" onclick="showToast('✅','Filters applied')">Apply Filters</button>
  </aside>

  <div>
    <div class="search-bar-shop">
      <i class="fas fa-search"></i>
      <input type="text" id="womenSearch" placeholder="Search women's collection..." oninput="filterWomenProducts()">
    </div>

    <div class="cat-tabs" id="catTabs">
      <button class="cat-tab active" onclick="setWomenTab(this,'all')">All</button>
      <button class="cat-tab" onclick="setWomenTab(this,'sarees')"><i class="fas fa-star"></i> Sarees</button>
      <button class="cat-tab" onclick="setWomenTab(this,'kurtis')">Kurtis</button>
      <button class="cat-tab" onclick="setWomenTab(this,'dresses')">Dresses</button>
      <button class="cat-tab" onclick="setWomenTab(this,'tops')">Tops</button>
      <button class="cat-tab" onclick="setWomenTab(this,'jeans')">Jeans</button>
    </div>

    <div class="shop-header">
      <span class="results-count" id="womenCount"></span>
      <select class="sort-select" id="womenSort" onchange="filterWomenProducts()">
        <option>Sort by: Featured</option>
        <option value="price-asc">Price: Low to High</option>
        <option value="price-desc">Price: High to Low</option>
        <option value="rating">Top Rated</option>
      </select>
    </div>

    <div class="products-grid" id="womenProductsGrid"></div>
    <div style="text-align:center;margin-top:40px;padding-bottom:20px">
      <button class="btn btn-outline" onclick="womenVisible+=8;filterWomenProducts()"><i class="fas fa-plus"></i> Load More</button>
    </div>
  </div>
</div>

<div id="footer-placeholder"></div>
<script src="app.js"></script>
<script src="components.js"></script>
<script>
let womenActiveTab = 'all', womenVisible = 8;
const womenProducts = PRODUCTS.filter(p => p.category === 'women');

// Add more sample women products
const extraWomen = [
  { id:'w5', name:'High Waist Skinny Jeans', price:1099, originalPrice:1999, category:'women', subcategory:'jeans', badge:'', rating:4.4, reviews:312, image:'https://images.unsplash.com/photo-1541099649105-f69ad21f3246?w=400&q=80', colors:['#1a3a5c'], sizes:['28','30','32','34'] },
  { id:'w6', name:'Boho Printed Dress', price:1299, originalPrice:2199, category:'women', subcategory:'dresses', badge:'new', rating:4.7, reviews:94, image:'https://images.unsplash.com/photo-1515372039744-b8f02a3ae446?w=400&q=80', colors:['#d4c8a0'], sizes:['S','M','L'] },
  { id:'w7', name:'Embroidered Kurti', price:899, originalPrice:1499, category:'women', subcategory:'kurtis', badge:'bestseller', rating:4.6, reviews:228, image:'https://images.unsplash.com/photo-1583391733956-6c78276477e2?w=400&q=80', colors:['#c0a8d4'], sizes:['XS','S','M','L','XL'] },
  { id:'w8', name:'Silk Blend Saree', price:3499, originalPrice:5999, category:'women', subcategory:'sarees', badge:'premium', rating:4.9, reviews:67, image:'https://images.unsplash.com/photo-1610030469983-98e550d6193c?w=400&q=80', colors:['#d40000','#0000d4'], sizes:['Free Size'] },
];
const allWomenProducts = [...womenProducts, ...extraWomen];

function setWomenTab(el, tab) {
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  womenActiveTab = tab; womenVisible = 8;
  filterWomenProducts();
}

function filterWomenProducts() {
  let res = womenActiveTab === 'all' ? allWomenProducts : allWomenProducts.filter(p => p.subcategory === womenActiveTab);
  const q = document.getElementById('womenSearch').value.toLowerCase();
  if (q) res = res.filter(p => p.name.toLowerCase().includes(q));
  const sort = document.getElementById('womenSort').value;
  if (sort === 'price-asc') res.sort((a,b) => a.price - b.price);
  else if (sort === 'price-desc') res.sort((a,b) => b.price - a.price);
  else if (sort === 'rating') res.sort((a,b) => b.rating - a.rating);
  const shown = res.slice(0, womenVisible);
  document.getElementById('womenCount').textContent = `${res.length} products found`;
  document.getElementById('womenProductsGrid').innerHTML = shown.map(p => buildProductCard(p, 'var(--women-accent)')).join('');
  initWishlistBtns();
}

function clearFilters() { filterWomenProducts(); }

document.addEventListener('DOMContentLoaded', () => filterWomenProducts());
</script>
</body>
</html>
