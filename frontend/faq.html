<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAQ – ASKR Clothing</title>
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Montserrat:wght@700;800;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
.faq-layout { max-width: 900px; margin: 0 auto; padding: 0 5% 80px; }
.faq-search-wrap { position: relative; margin-bottom: 40px; }
.faq-search-wrap i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 1rem; }
.faq-search-wrap input { width: 100%; padding: 16px 20px 16px 50px; background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; color: var(--text); font-size: 1rem; outline: none; transition: all 0.3s; }
.faq-search-wrap input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(255,107,0,0.1); }
.faq-categories { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 30px; }
.faq-cat-btn { padding: 8px 20px; border-radius: 50px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: var(--text-muted); font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: all 0.3s; font-family: 'Poppins',sans-serif; }
.faq-cat-btn.active, .faq-cat-btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
.faq-section { margin-bottom: 40px; }
.faq-section-title { font-size: 0.75rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.faq-section-title::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.06); }
.faq-item { border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; margin-bottom: 10px; overflow: hidden; transition: all 0.3s; }
.faq-item:hover { border-color: rgba(255,107,0,0.2); }
.faq-item.open { border-color: rgba(255,107,0,0.3); }
.faq-question { display: flex; justify-content: space-between; align-items: center; padding: 18px 22px; cursor: pointer; background: var(--card-bg); transition: all 0.3s; }
.faq-question:hover { background: rgba(255,107,0,0.04); }
.faq-q-text { font-weight: 600; font-size: 0.9rem; padding-right: 20px; flex: 1; }
.faq-toggle { width: 30px; height: 30px; border-radius: 8px; background: rgba(255,107,0,0.1); border: 1px solid rgba(255,107,0,0.2); display: flex; align-items: center; justify-content: center; color: var(--accent); flex-shrink: 0; transition: all 0.3s; }
.faq-item.open .faq-toggle { background: var(--accent); color: #fff; transform: rotate(45deg); }
.faq-answer { max-height: 0; overflow: hidden; transition: max-height 0.4s cubic-bezier(0.4,0,0.2,1), padding 0.3s; background: rgba(255,255,255,0.02); }
.faq-item.open .faq-answer { max-height: 500px; }
.faq-answer-content { padding: 16px 22px 20px; color: var(--text-muted); font-size: 0.85rem; line-height: 1.8; }
.faq-answer-content a { color: var(--accent); }
.no-results { text-align: center; padding: 60px 0; }
.no-results i { font-size: 3rem; color: rgba(255,255,255,0.1); margin-bottom: 16px; display: block; }
</style>
</head>
<body>
<div id="navbar-placeholder"></div>

<div class="page-header">
  <h1>Frequently Asked <span style="color:var(--accent)">Questions</span></h1>
  <p>Everything you need to know about ASKR Clothing</p>
  <div class="breadcrumb"><a href="home.html">Home</a><span class="sep">›</span><span>FAQ</span></div>
</div>

<div class="faq-layout">
  <div class="faq-search-wrap">
    <i class="fas fa-search"></i>
    <input type="text" id="faqSearch" placeholder="Search your question..." oninput="searchFAQ()">
  </div>

  <div class="faq-categories">
    <button class="faq-cat-btn active" onclick="filterFAQ('all',this)">All</button>
    <button class="faq-cat-btn" onclick="filterFAQ('orders',this)"><i class="fas fa-shopping-bag"></i> Orders</button>
    <button class="faq-cat-btn" onclick="filterFAQ('shipping',this)"><i class="fas fa-truck"></i> Shipping</button>
    <button class="faq-cat-btn" onclick="filterFAQ('returns',this)"><i class="fas fa-undo"></i> Returns</button>
    <button class="faq-cat-btn" onclick="filterFAQ('payment',this)"><i class="fas fa-credit-card"></i> Payment</button>
    <button class="faq-cat-btn" onclick="filterFAQ('account',this)"><i class="fas fa-user"></i> Account</button>
  </div>

  <div id="faqContainer"></div>
</div>

<div style="background:var(--secondary);border-top:1px solid rgba(255,255,255,0.05);padding:60px 5%;text-align:center">
  <h3 style="font-size:1.3rem;margin-bottom:10px">Still have questions?</h3>
  <p style="color:var(--text-muted);margin-bottom:24px">Our support team is available 24/7 to help you</p>
  <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
    <a href="contact.html" class="btn btn-primary"><i class="fas fa-envelope"></i> Contact Us</a>
    <a href="#" class="btn btn-outline"><i class="fas fa-comments"></i> Live Chat</a>
  </div>
</div>

<div id="footer-placeholder"></div>
<script src="app.js"></script>
<script src="components.js"></script>
<script>
const faqs = [
  { cat:'orders', q:'How do I place an order on ASKR?', a:'Simply browse our collections, select your preferred size and color, add to cart, and proceed to checkout. You can pay via UPI, credit/debit card, net banking, or cash on delivery.' },
  { cat:'orders', q:'Can I modify or cancel my order after placing?', a:'You can modify or cancel your order within 1 hour of placing it by contacting our support team. After 1 hour, the order enters processing and cannot be modified.' },
  { cat:'orders', q:'How do I track my order?', a:'Once your order is shipped, you\'ll receive a tracking ID via SMS and email. You can also track your order in real-time on our <a href="tracking.html">Order Tracking page</a>.' },
  { cat:'shipping', q:'What are the shipping charges?', a:'Shipping is FREE on all orders above ₹999. For orders below ₹999, a flat ₹99 shipping fee is applied. Express delivery is available for ₹99 extra (2-3 days).' },
  { cat:'shipping', q:'How long does delivery take?', a:'Standard delivery takes 5-7 business days. Express delivery takes 2-3 business days. Same-day delivery is available in Bangalore, Mumbai, and Delhi for orders placed before 12 PM.' },
  { cat:'shipping', q:'Do you ship internationally?', a:'Currently, we ship within India only. We plan to expand to international shipping in Q2 2025. Sign up for our newsletter to be notified when we launch!' },
  { cat:'returns', q:'What is the return policy?', a:'We offer a 30-day hassle-free return policy. Items must be unworn, unwashed, with original tags attached. We provide free pickup from your doorstep for returns.' },
  { cat:'returns', q:'How long does the refund take?', a:'Once we receive and verify your returned item, the refund is processed within 3-5 business days to your original payment method. UPI refunds are faster (1-2 days).' },
  { cat:'returns', q:'Can I exchange a product for a different size?', a:'Yes! You can exchange any product for a different size within 30 days. Simply initiate an exchange from your order history in your account.' },
  { cat:'payment', q:'What payment methods are accepted?', a:'We accept UPI (Google Pay, PhonePe, Paytm, BHIM), Credit Cards (Visa, Mastercard, Amex), Debit Cards, Net Banking (all major Indian banks), and Cash on Delivery.' },
  { cat:'payment', q:'Is my payment information secure?', a:'Absolutely. We use 256-bit SSL encryption and are PCI-DSS certified. Your card details are never stored on our servers. All transactions go through secure payment gateways.' },
  { cat:'payment', q:'Are there any EMI options available?', a:'Yes! EMI options are available on orders above ₹3,000 via select credit cards. EMI options appear automatically at checkout when eligible.' },
  { cat:'account', q:'How do I create an ASKR account?', a:'Click "Register" and fill in your details. You\'ll get a welcome email with a 15% discount code for your first order! You can also sign in with Google or Facebook.' },
  { cat:'account', q:'I forgot my password. How do I reset it?', a:'Click "Forgot Password" on the login page, enter your email, and we\'ll send you a password reset link within 2 minutes. Check your spam folder if you don\'t receive it.' },
  { cat:'account', q:'How do I update my delivery address?', a:'Go to My Account → Saved Addresses → Edit. You can save multiple addresses and mark one as default for faster checkout.' },
];

let activeCategory = 'all';

function renderFAQs(items) {
  const container = document.getElementById('faqContainer');
  if (!items.length) {
    container.innerHTML = `<div class="no-results"><i class="fas fa-search"></i><h4>No results found</h4><p style="color:var(--text-muted);margin-top:8px">Try a different search term</p></div>`;
    return;
  }

  const categories = { orders:'Orders & Purchases', shipping:'Shipping & Delivery', returns:'Returns & Refunds', payment:'Payments', account:'Account & Profile' };
  const grouped = {};
  items.forEach(f => { if (!grouped[f.cat]) grouped[f.cat] = []; grouped[f.cat].push(f); });

  container.innerHTML = Object.entries(grouped).map(([cat, qs]) => `
    <div class="faq-section">
      <div class="faq-section-title">${categories[cat] || cat}</div>
      ${qs.map((faq, i) => `
        <div class="faq-item" id="faq-${cat}-${i}">
          <div class="faq-question" onclick="toggleFAQ('${cat}-${i}')">
            <span class="faq-q-text">${faq.q}</span>
            <div class="faq-toggle"><i class="fas fa-plus"></i></div>
          </div>
          <div class="faq-answer"><div class="faq-answer-content">${faq.a}</div></div>
        </div>`).join('')}
    </div>`).join('');
}

function toggleFAQ(id) {
  const item = document.getElementById('faq-' + id);
  const isOpen = item.classList.contains('open');
  document.querySelectorAll('.faq-item.open').forEach(i => i.classList.remove('open'));
  if (!isOpen) item.classList.add('open');
}

function filterFAQ(cat, btn) {
  activeCategory = cat;
  document.querySelectorAll('.faq-cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const filtered = cat === 'all' ? faqs : faqs.filter(f => f.cat === cat);
  renderFAQs(filtered);
}

function searchFAQ() {
  const q = document.getElementById('faqSearch').value.toLowerCase();
  const filtered = faqs.filter(f => f.q.toLowerCase().includes(q) || f.a.toLowerCase().includes(q));
  renderFAQs(q ? filtered : (activeCategory === 'all' ? faqs : faqs.filter(f => f.cat === activeCategory)));
}

document.addEventListener('DOMContentLoaded', () => renderFAQs(faqs));
</script>
</body>
</html>
