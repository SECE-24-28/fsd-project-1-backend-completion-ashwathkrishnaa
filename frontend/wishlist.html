<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wishlist – ASKR Clothing</title>
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Montserrat:wght@700;800;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
.wishlist-item { display: flex; gap: 20px; background: var(--card-bg); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 20px; align-items: center; transition: all 0.3s; }
.wishlist-item:hover { border-color: rgba(255,107,0,0.25); }
.wishlist-img { width: 100px; height: 120px; border-radius: 10px; overflow: hidden; flex-shrink: 0; }
.wishlist-img img { width: 100%; height: 100%; object-fit: cover; }
.wishlist-info { flex: 1; }
.wishlist-actions { display: flex; gap: 10px; flex-direction: column; }
.empty-state { text-align: center; padding: 80px 20px; }
.empty-state i { font-size: 4rem; color: rgba(255,255,255,0.1); margin-bottom: 20px; display: block; }
.wishlist-grid { display: flex; flex-direction: column; gap: 16px; max-width: 800px; margin: 0 auto; }
@media (max-width:600px) { .wishlist-item { flex-direction: column; align-items: flex-start; } .wishlist-actions { flex-direction: row; } }
</style>
</head>
<body>
<div id="navbar-placeholder"></div>
<div class="page-header">
  <h1>My <span style="color:var(--accent)">Wishlist</span></h1>
  <p id="wishlistCount"></p>
  <div class="breadcrumb"><a href="home.html">Home</a><span class="sep">›</span><span>Wishlist</span></div>
</div>

<div style="padding: 0 5% 80px; max-width: 900px; margin: 0 auto">
  <div id="wishlistContent"></div>
</div>

<div id="footer-placeholder"></div>
<script src="app.js"></script>
<script src="components.js"></script>
<script>
function renderWishlist() {
  const list = state.wishlist;
  document.getElementById('wishlistCount').textContent = `${list.length} saved item${list.length !== 1 ? 's' : ''}`;
  if (!list.length) {
    document.getElementById('wishlistContent').innerHTML = `
      <div class="empty-state">
        <i class="far fa-heart"></i>
        <h3>Your wishlist is empty</h3>
        <p style="color:var(--text-muted);margin-top:8px;margin-bottom:28px">Save items you love to your wishlist</p>
        <a href="home.html" class="btn btn-primary btn-lg">Start Shopping</a>
      </div>`;
    return;
  }
  document.getElementById('wishlistContent').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <span style="color:var(--text-muted);font-size:0.85rem">${list.length} items saved</span>
      <button class="btn btn-outline btn-sm" onclick="moveAllToCart()"><i class="fas fa-shopping-bag"></i> Add All to Cart</button>
    </div>
    <div class="wishlist-grid">
      ${list.map(item => `
        <div class="wishlist-item" id="wishItem-${item.id}">
          <div class="wishlist-img"><img src="${item.image}" alt="${item.name}"></div>
          <div class="wishlist-info">
            <div style="font-size:0.7rem;color:var(--accent);letter-spacing:2px;font-weight:600;margin-bottom:4px">ASKR</div>
            <div style="font-weight:600;font-size:0.95rem;margin-bottom:8px">${item.name}</div>
            <div style="font-family:Montserrat;font-size:1.2rem;font-weight:800;color:var(--accent)">₹${item.price.toLocaleString()}</div>
          </div>
          <div class="wishlist-actions">
            <button class="btn btn-primary btn-sm" onclick="moveToCart('${item.id}')"><i class="fas fa-shopping-bag"></i> Add to Cart</button>
            <button class="btn btn-outline btn-sm" onclick="removeWishItem('${item.id}')"><i class="fas fa-trash"></i> Remove</button>
          </div>
        </div>`).join('')}
    </div>`;
}

function removeWishItem(id) {
  const item = state.wishlist.find(i => i.id === id);
  if (item) { toggleWishlist(item); renderWishlist(); }
}
function moveToCart(id) {
  const item = state.wishlist.find(i => i.id === id);
  if (item) { addToCart({ ...item, size: 'M' }); removeWishItem(id); }
}
function moveAllToCart() {
  [...state.wishlist].forEach(item => addToCart({ ...item, size: 'M' }));
  state.wishlist = []; saveState(); updateBadges();
  showToast('🛒', 'All items moved to cart!');
  renderWishlist();
}

document.addEventListener('DOMContentLoaded', renderWishlist);
</script>
</body>
</html>
