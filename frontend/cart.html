<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart – ASKR Clothing</title>
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Montserrat:wght@700;800;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
.cart-layout { display: grid; grid-template-columns: 1fr 380px; gap: 30px; padding: 30px 5% 80px; padding-top: 0; max-width: 1400px; margin: 0 auto; }
.cart-item { display: flex; gap: 16px; background: var(--card-bg); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 16px; align-items: center; transition: all 0.3s; }
.cart-item:hover { border-color: rgba(255,107,0,0.2); }
.cart-item-img { width: 90px; height: 110px; border-radius: 10px; overflow: hidden; flex-shrink: 0; }
.cart-item-img img { width: 100%; height: 100%; object-fit: cover; }
.cart-item-info { flex: 1; }
.cart-item-name { font-weight: 600; font-size: 0.9rem; margin-bottom: 4px; }
.cart-item-meta { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 10px; }
.qty-row { display: flex; align-items: center; gap: 12px; }
.qty-ctrl { display: flex; align-items: center; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; overflow: hidden; }
.qty-ctrl button { width: 34px; height: 34px; background: none; border: none; color: var(--text); cursor: pointer; transition: all 0.2s; font-size: 0.9rem; }
.qty-ctrl button:hover { background: var(--accent); color: #fff; }
.qty-ctrl span { min-width: 32px; text-align: center; font-weight: 700; font-size: 0.9rem; }
.order-summary-box { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; padding: 24px; height: fit-content; position: sticky; top: 90px; }
.summary-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; font-size: 0.88rem; }
.summary-row.total { font-size: 1.1rem; font-weight: 800; border-top: 1px solid rgba(255,255,255,0.1); margin-top: 8px; padding-top: 16px; }
.summary-row.total .val { color: var(--accent); font-family: 'Montserrat', sans-serif; font-size: 1.3rem; }
.coupon-input { display: flex; gap: 0; margin-top: 16px; }
.coupon-input input { flex: 1; padding: 12px 14px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-right: none; border-radius: 8px 0 0 8px; color: var(--text); font-size: 0.85rem; outline: none; }
.coupon-input input:focus { border-color: var(--accent); }
.coupon-input button { padding: 12px 16px; background: var(--accent); border: none; border-radius: 0 8px 8px 0; color: #fff; font-weight: 600; cursor: pointer; font-size: 0.82rem; font-family: 'Poppins', sans-serif; transition: all 0.3s; }
.coupon-input button:hover { background: var(--accent-hover); }
.free-ship-bar { margin: 14px 0; }
.free-ship-bar p { font-size: 0.78rem; color: var(--text-muted); margin-bottom: 6px; }
.free-ship-bar p span { color: var(--accent); font-weight: 600; }
.free-ship-progress { height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
.free-ship-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--gold)); border-radius: 2px; transition: width 0.5s ease; }
.cart-items-list { display: flex; flex-direction: column; gap: 14px; }
@media (max-width:900px) { .cart-layout { grid-template-columns: 1fr; } .order-summary-box { position: static; } }
@media (max-width:600px) { .cart-item { flex-direction: column; } }
</style>
</head>
<body>
<div id="navbar-placeholder"></div>
<div class="page-header">
  <h1>Shopping <span style="color:var(--accent)">Cart</span></h1>
  <div class="breadcrumb"><a href="home.html">Home</a><span class="sep">›</span><span>Cart</span></div>
</div>

<div class="cart-layout" id="cartLayout">
  <div id="cartItemsArea"></div>
  <div id="cartSummaryArea"></div>
</div>

<div id="footer-placeholder"></div>
<script src="app.js"></script>
<script src="components.js"></script>
<script>
let appliedDiscount = 0;

function renderCart() {
  const cart = state.cart;
  const subtotal = getCartTotal();
  const shipping = subtotal >= 999 ? 0 : 99;
  const discountAmt = Math.round(subtotal * appliedDiscount / 100);
  const total = subtotal - discountAmt + shipping;
  const shipProgress = Math.min(100, (subtotal / 999) * 100);

  if (!cart.length) {
    document.getElementById('cartItemsArea').innerHTML = `
      <div style="text-align:center;padding:80px 20px">
        <i class="fas fa-shopping-bag" style="font-size:4rem;color:rgba(255,255,255,0.1);margin-bottom:20px;display:block"></i>
        <h3>Your cart is empty</h3>
        <p style="color:var(--text-muted);margin:10px 0 28px">Add items to get started</p>
        <a href="home.html" class="btn btn-primary btn-lg">Continue Shopping</a>
      </div>`;
    document.getElementById('cartSummaryArea').innerHTML = '';
    return;
  }

  document.getElementById('cartItemsArea').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
      <h3 style="font-size:1.1rem">${cart.length} Item${cart.length!==1?'s':''} in Cart</h3>
      <button class="btn btn-outline btn-sm" onclick="clearCartAll()"><i class="fas fa-trash"></i> Clear All</button>
    </div>
    <div class="cart-items-list">
      ${cart.map(item => `
        <div class="cart-item">
          <div class="cart-item-img"><img src="${item.image}" alt="${item.name}"></div>
          <div class="cart-item-info">
            <div style="font-size:0.7rem;color:var(--accent);font-weight:600;letter-spacing:2px;margin-bottom:4px">ASKR</div>
            <div class="cart-item-name">${item.name}</div>
            <div class="cart-item-meta">Size: ${item.size || 'M'}</div>
            <div class="qty-row">
              <div class="qty-ctrl">
                <button onclick="updateCartQty('${item.id}','${item.size}',-1)"><i class="fas fa-minus"></i></button>
                <span>${item.qty}</span>
                <button onclick="updateCartQty('${item.id}','${item.size}',1)"><i class="fas fa-plus"></i></button>
              </div>
              <span style="font-family:Montserrat;font-weight:800;color:var(--accent)">₹${(item.price*item.qty).toLocaleString()}</span>
            </div>
          </div>
          <button class="btn btn-outline btn-sm" onclick="removeCartItem('${item.id}','${item.size}')" style="align-self:flex-start"><i class="fas fa-times"></i></button>
        </div>`).join('')}
    </div>`;

  document.getElementById('cartSummaryArea').innerHTML = `
    <div class="order-summary-box">
      <h4 style="font-size:0.8rem;letter-spacing:2px;text-transform:uppercase;margin-bottom:20px">Order Summary</h4>
      <div class="summary-row"><span style="color:var(--text-muted)">Subtotal</span><span>₹${subtotal.toLocaleString()}</span></div>
      <div class="summary-row"><span style="color:var(--text-muted)">Shipping</span><span style="color:${shipping===0?'#2ecc71':'inherit'}">${shipping===0?'FREE':'₹'+shipping}</span></div>
      ${appliedDiscount ? `<div class="summary-row"><span style="color:#2ecc71">Discount (${appliedDiscount}%)</span><span style="color:#2ecc71">-₹${discountAmt.toLocaleString()}</span></div>` : ''}
      <div class="summary-row total"><span>Total</span><span class="val">₹${total.toLocaleString()}</span></div>
      <div class="free-ship-bar">
        <p>${shipping===0 ? '🎉 You have free shipping!' : `Add ₹<span>${(999-subtotal).toLocaleString()}</span> more for free shipping`}</p>
        <div class="free-ship-progress"><div class="free-ship-fill" style="width:${shipProgress}%"></div></div>
      </div>
      <div style="font-size:0.75rem;color:var(--text-muted);margin-bottom:8px;margin-top:14px">Have a coupon?</div>
      <div class="coupon-input">
        <input type="text" id="couponInput" placeholder="Enter coupon code" style="text-transform:uppercase">
        <button onclick="handleCoupon()">Apply</button>
      </div>
      <div style="font-size:0.72rem;color:var(--text-muted);margin-top:6px">Try: ASKR10, ASKR20, WELCOME15</div>
      <a href="checkout.html" class="btn btn-primary btn-full btn-lg" style="margin-top:20px">
        <i class="fas fa-lock"></i> Proceed to Checkout
      </a>
      <a href="home.html" class="btn btn-outline btn-full" style="margin-top:10px"><i class="fas fa-arrow-left"></i> Continue Shopping</a>
    </div>`;
}

function updateCartQty(id, size, delta) {
  const item = state.cart.find(i => i.id === id && i.size === size);
  if (!item) return;
  item.qty = Math.max(1, item.qty + delta);
  saveState(); updateBadges(); renderCart();
}
function removeCartItem(id, size) {
  removeFromCart(id, size);
  renderCart();
}
function clearCartAll() {
  if (!confirm('Clear all items from cart?')) return;
  state.cart = []; saveState(); updateBadges(); renderCart();
}
function handleCoupon() {
  const code = document.getElementById('couponInput').value.trim();
  const disc = applyCoupon(code);
  if (disc) { appliedDiscount = disc; renderCart(); }
}
document.addEventListener('DOMContentLoaded', renderCart);
</script>
</body>
</html>
