<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login – ASKR Clothing</title>
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Montserrat:wght@700;800;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
.auth-page {
  min-height: 100vh; display: grid; grid-template-columns: 1fr 1fr;
  background: var(--primary);
}
.auth-visual {
  position: relative; overflow: hidden;
  background: linear-gradient(135deg, #1a0800 0%, #0D0D0D 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 40px;
}
.auth-visual-bg {
  position: absolute; inset: 0;
  background: url('https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=800&q=80') center/cover;
  opacity: 0.15;
}
.auth-visual-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,107,0,0.15) 0%, rgba(13,13,13,0.95) 60%);
}
.auth-visual-content { position: relative; z-index: 2; text-align: center; }
.auth-brand { margin-bottom: 30px; }
.auth-brand-logo { width: 80px; height: auto; margin-bottom: 16px; }
.auth-brand-name { font-family: 'Montserrat', sans-serif; font-size: 2.5rem; font-weight: 900; letter-spacing: 10px; color: var(--text); }
.auth-brand-name span { color: var(--accent); }
.auth-tagline { font-size: 0.9rem; letter-spacing: 4px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 50px; }
.auth-features { display: flex; flex-direction: column; gap: 18px; max-width: 300px; margin: 0 auto; }
.auth-feature { display: flex; align-items: center; gap: 14px; text-align: left; }
.auth-feature-icon { width: 44px; height: 44px; border-radius: 10px; background: rgba(255,107,0,0.15); border: 1px solid rgba(255,107,0,0.3); display: flex; align-items: center; justify-content: center; color: var(--accent); font-size: 1rem; flex-shrink: 0; }
.auth-feature-text strong { display: block; font-size: 0.85rem; color: var(--text); font-family: 'Poppins', sans-serif; }
.auth-feature-text span { font-size: 0.75rem; color: var(--text-muted); }
.auth-glow { position: absolute; width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle, rgba(255,107,0,0.12) 0%, transparent 70%); top: 50%; left: 50%; transform: translate(-50%, -50%); }

.auth-form-side { display: flex; align-items: center; justify-content: center; padding: 40px; }
.auth-form-box { width: 100%; max-width: 440px; }
.auth-form-header { margin-bottom: 40px; }
.auth-form-header h2 { font-size: 2rem; font-weight: 800; margin-bottom: 6px; }
.auth-form-header h2 span { color: var(--accent); }
.auth-form-header p { color: var(--text-muted); font-size: 0.9rem; }

.social-login { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
.social-btn-auth { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 12px; border-radius: 10px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: var(--text); font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: all 0.3s ease; text-decoration: none; font-family: 'Poppins', sans-serif; }
.social-btn-auth:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.2); transform: translateY(-2px); }
.social-btn-auth .fa-google { color: #DB4437; }
.social-btn-auth .fa-facebook-f { color: #4267B2; }

.divider-text { text-align: center; position: relative; margin: 20px 0; color: var(--text-muted); font-size: 0.8rem; }
.divider-text::before, .divider-text::after { content: ''; position: absolute; top: 50%; width: calc(50% - 20px); height: 1px; background: rgba(255,255,255,0.08); }
.divider-text::before { left: 0; } .divider-text::after { right: 0; }

.form-extras { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.remember-me { display: flex; align-items: center; gap: 8px; cursor: pointer; }
.remember-me input { accent-color: var(--accent); }
.remember-me span { font-size: 0.83rem; color: var(--text-muted); }
.forgot-link { color: var(--accent); font-size: 0.83rem; text-decoration: none; transition: all 0.3s; }
.forgot-link:hover { color: var(--accent-hover); text-decoration: underline; }
.auth-switch { text-align: center; margin-top: 24px; font-size: 0.85rem; color: var(--text-muted); }
.auth-switch a { color: var(--accent); text-decoration: none; font-weight: 600; }
.auth-switch a:hover { text-decoration: underline; }

@media (max-width: 768px) {
  .auth-page { grid-template-columns: 1fr; }
  .auth-visual { display: none; }
  .auth-form-side { padding: 30px 20px; }
}
</style>
</head>
<body>
<div class="auth-page">
  <div class="auth-visual">
    <div class="auth-visual-bg"></div>
    <div class="auth-visual-overlay"></div>
    <div class="auth-glow"></div>
    <div class="auth-visual-content">
      <div class="auth-brand">
        <img src="askr-logo.png" alt="ASKR" class="auth-brand-logo" onerror="this.style.display='none'">
        <div class="auth-brand-name">ASK<span>R</span></div>
        <div class="auth-tagline">Elevate Your Style</div>
      </div>
      <div class="auth-features">
        <div class="auth-feature">
          <div class="auth-feature-icon"><i class="fas fa-crown"></i></div>
          <div class="auth-feature-text"><strong>Premium Members</strong><span>Exclusive deals & early access</span></div>
        </div>
        <div class="auth-feature">
          <div class="auth-feature-icon"><i class="fas fa-shipping-fast"></i></div>
          <div class="auth-feature-text"><strong>Free Express Shipping</strong><span>On all orders above ₹999</span></div>
        </div>
        <div class="auth-feature">
          <div class="auth-feature-icon"><i class="fas fa-undo"></i></div>
          <div class="auth-feature-text"><strong>30-Day Returns</strong><span>Hassle-free return policy</span></div>
        </div>
      </div>
    </div>
  </div>

  <div class="auth-form-side">
    <div class="auth-form-box">
      <div class="auth-form-header">
        <h2>Welcome <span>Back</span></h2>
        <p>Sign in to your ASKR account</p>
      </div>

      <div class="social-login">
        <a href="#" class="social-btn-auth"><i class="fab fa-google"></i> Google</a>
        <a href="#" class="social-btn-auth"><i class="fab fa-facebook-f"></i> Facebook</a>
      </div>
      <div class="divider-text">or sign in with email</div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>Email Address</label>
          <div class="input-group">
            <i class="fas fa-envelope input-icon"></i>
            <input type="email" class="form-control" id="loginEmail" placeholder="you@email.com" required>
          </div>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-group">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" class="form-control" id="loginPassword" placeholder="Enter your password" required>
            <button type="button" class="input-toggle" onclick="togglePass('loginPassword', this)"><i class="far fa-eye"></i></button>
          </div>
        </div>
        <div class="form-extras">
          <label class="remember-me">
            <input type="checkbox" id="rememberMe"> <span>Remember me</span>
          </label>
          <a href="#" class="forgot-link">Forgot Password?</a>
        </div>
        <button type="submit" class="btn btn-primary btn-full btn-lg">
          <i class="fas fa-sign-in-alt"></i> Sign In
        </button>
      </form>
      <div class="auth-switch">
        New to ASKR? <a href="register.html">Create Account</a>
      </div>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
function togglePass(id, btn) {
  const inp = document.getElementById(id);
  const isPass = inp.type === 'password';
  inp.type = isPass ? 'text' : 'password';
  btn.innerHTML = `<i class="far fa-eye${isPass ? '-slash' : ''}"></i>`;
}
function handleLogin(e) {
  e.preventDefault();
  const btn = e.target.querySelector('button[type="submit"]');
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';
  btn.disabled = true;
  setTimeout(() => {
    localStorage.setItem('askr_user', JSON.stringify({ email: document.getElementById('loginEmail').value, name: 'ASKR User' }));
    window.location.href = 'home.html';
  }, 1500);
}
</script>
</body>
</html>
