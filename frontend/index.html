<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASKR Clothing – Elevate Your Style</title>
<link rel="stylesheet" href="styles.css">
<style>
  body { overflow: hidden; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .splash {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, #1a0a00 0%, #0D0D0D 60%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 9999;
  }
  .splash-glow {
    position: absolute; width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(255,107,0,0.18) 0%, transparent 70%);
    border-radius: 50%; animation: pulseGlow 3s ease-in-out infinite;
  }
  @keyframes pulseGlow { 0%,100% { transform: scale(1); opacity:0.7; } 50% { transform: scale(1.2); opacity:1; } }
  .splash-particles { position: absolute; inset: 0; overflow: hidden; }
  .particle {
    position: absolute; width: 3px; height: 3px; border-radius: 50%;
    background: var(--accent); opacity: 0;
    animation: particleFloat linear infinite;
  }
  @keyframes particleFloat {
    0% { opacity: 0; transform: translateY(100vh) scale(0); }
    10% { opacity: 0.8; }
    90% { opacity: 0.3; }
    100% { opacity: 0; transform: translateY(-10vh) scale(1); }
  }
  .splash-content { position: relative; z-index: 2; text-align: center; }
  .splash-logo-wrap {
    width: 160px; height: 160px; border-radius: 50%;
    background: rgba(255,107,0,0.1);
    border: 2px solid rgba(255,107,0,0.3);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 30px;
    animation: logoPulse 2s ease-in-out infinite, logoAppear 0.8s ease forwards;
    box-shadow: 0 0 60px rgba(255,107,0,0.3), inset 0 0 30px rgba(255,107,0,0.05);
  }
  @keyframes logoPulse { 0%,100% { box-shadow: 0 0 40px rgba(255,107,0,0.3), inset 0 0 20px rgba(255,107,0,0.05); } 50% { box-shadow: 0 0 80px rgba(255,107,0,0.6), inset 0 0 40px rgba(255,107,0,0.1); } }
  @keyframes logoAppear { from { opacity:0; transform: scale(0.5) rotate(-10deg); } to { opacity:1; transform: scale(1) rotate(0deg); } }
  .splash-logo-img { width: 100px; height: auto; }
  .splash-logo-text { font-family: 'Montserrat', sans-serif; font-size: 4rem; font-weight: 900; letter-spacing: 12px; color: var(--text); animation: textAppear 1s 0.3s ease both; }
  .splash-logo-text span { color: var(--accent); }
  @keyframes textAppear { from { opacity:0; transform: translateY(20px) letterSpacing(20px); } to { opacity:1; transform: translateY(0); } }
  .splash-tagline { font-size: 0.9rem; letter-spacing: 6px; text-transform: uppercase; color: var(--text-muted); animation: textAppear 1s 0.6s ease both; margin-bottom: 50px; }
  .splash-tagline span { color: var(--accent); }
  .splash-loader { width: 200px; height: 2px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; animation: textAppear 1s 0.9s ease both; }
  .splash-loader-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--gold)); border-radius: 2px; animation: load 2.5s ease forwards; }
  @keyframes load { from { width: 0; } to { width: 100%; } }
  .splash-enter { position: absolute; bottom: 40px; animation: textAppear 1s 1.2s ease both; cursor: pointer; }
  .splash-enter-btn { padding: 14px 40px; background: transparent; border: 1.5px solid var(--accent); border-radius: 50px; color: var(--text); font-family: 'Poppins', sans-serif; font-size: 0.85rem; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; transition: all 0.3s ease; text-decoration: none; display: inline-flex; align-items: center; gap: 10px; }
  .splash-enter-btn:hover { background: var(--accent); box-shadow: 0 0 30px rgba(255,107,0,0.5); }
  .splash.exit { animation: splashExit 0.8s ease forwards; }
  @keyframes splashExit { to { opacity: 0; transform: scale(1.05); } }
  .ring { position: absolute; border: 1px solid rgba(255,107,0,0.15); border-radius: 50%; animation: ringExpand 4s linear infinite; }
  @keyframes ringExpand { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(2); opacity: 0; } }
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&family=Montserrat:wght@700;800;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
<div class="splash" id="splash">
  <div class="splash-glow"></div>
  <div class="splash-particles" id="particles"></div>
  <div class="splash-content">
    <div class="splash-logo-wrap">
      <img src="askr-logo.png" alt="ASKR" class="splash-logo-img" onerror="this.outerHTML='<div style=\'font-family:Montserrat;font-size:2.5rem;font-weight:900;color:#FF6B00;letter-spacing:4px;\'>ASKR</div>'">
      <div class="ring" style="width:180px;height:180px;animation-delay:0s"></div>
      <div class="ring" style="width:180px;height:180px;animation-delay:1.5s"></div>
    </div>
    <div class="splash-logo-text">ASK<span>R</span></div>
    <div class="splash-tagline">Elevate Your <span>Style</span></div>
    <div class="splash-loader"><div class="splash-loader-bar"></div></div>
  </div>
  <div class="splash-enter">
    <a href="home.html" class="splash-enter-btn" id="enterBtn">
      Enter <i class="fas fa-arrow-right"></i>
    </a>
  </div>
</div>
<script>
// Generate particles
const container = document.getElementById('particles');
for (let i = 0; i < 30; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  p.style.left = Math.random() * 100 + '%';
  p.style.animationDuration = (Math.random() * 8 + 4) + 's';
  p.style.animationDelay = (Math.random() * 5) + 's';
  p.style.width = p.style.height = (Math.random() * 4 + 2) + 'px';
  container.appendChild(p);
}

// Auto redirect after 4s
setTimeout(() => {
  document.getElementById('splash').classList.add('exit');
  setTimeout(() => window.location.href = 'home.html', 800);
}, 4000);

document.getElementById('enterBtn').addEventListener('click', (e) => {
  e.preventDefault();
  document.getElementById('splash').classList.add('exit');
  setTimeout(() => window.location.href = 'home.html', 800);
});
</script>
</body>
</html>
